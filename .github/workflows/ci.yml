name: CI - automated build and tests

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  infrastructure:
    name: Terraform source validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: "1.15.8"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infrastructure/google-cloud

      - name: Validate inert development boundary
        working-directory: infrastructure/google-cloud/environments/development
        run: |
          terraform init -backend=false -input=false
          terraform validate

      - name: Test infrastructure approval gates
        working-directory: infrastructure/google-cloud/modules/foundation
        run: |
          terraform init -backend=false -input=false
          terraform validate
          terraform test

      - name: Prove activation lock blocks a post-apply off-plan
        working-directory: infrastructure/google-cloud/modules/foundation
        shell: bash
        run: |
          set +e
          lock_output="$(terraform test -test-directory=expected-failure-tests -no-color 2>&1)"
          lock_status=$?
          set -e
          printf '%s\n' "$lock_output"

          if [ "$lock_status" -eq 0 ]; then
            echo "Expected lifecycle.prevent_destroy to reject the off-plan."
            exit 1
          fi
          grep -Fq "Resource terraform_data.core_activation_lock[0] has" <<< "$lock_output"
          grep -Fq "lifecycle.prevent_destroy" <<< "$lock_output"

      - name: Validate and test staging definitions
        working-directory: infrastructure/google-cloud/environments/staging
        run: |
          terraform init -backend=false -input=false
          terraform validate
          terraform test

      - name: Validate and test production definitions
        working-directory: infrastructure/google-cloud/environments/production
        run: |
          terraform init -backend=false -input=false
          terraform validate
          terraform test

  test:
    name: Node 22 lint, build, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fci_test
          POSTGRES_USER: fci_test
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fci_test -d fci_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and test
        run: npm test
        env:
          TEST_POSTGRES_URL: postgresql://fci_test:test-only-password@127.0.0.1:5432/fci_test

  browser:
    name: Chromium rendered regression tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      FCI_E2E: true
      FCI_LOCAL_DEV_USER_EMAIL: e2e-admin@example.test
      FCI_OFFICE_EMAILS: e2e-admin@example.test,e2e-office@example.test
      FCI_ADMIN_EMAILS: e2e-admin@example.test
      GOOGLE_INTEGRATION_MODE: simulation

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run rendered regression tests
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-browser-diagnostics
          path: |
            work/playwright-report
            work/playwright-results
          if-no-files-found: ignore
          retention-days: 7
