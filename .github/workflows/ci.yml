name: CI - automated build and tests

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node 22 lint, build, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fci_test
          POSTGRES_USER: fci_test
          POSTGRES_PASSWORD: test-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fci_test -d fci_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and test
        run: npm test
        env:
          TEST_POSTGRES_URL: postgresql://fci_test:test-only-password@127.0.0.1:5432/fci_test

  browser:
    name: Chromium rendered regression tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: true
      FCI_E2E: true
      FCI_LOCAL_DEV_USER_EMAIL: e2e-admin@example.test
      FCI_OFFICE_EMAILS: e2e-admin@example.test
      FCI_ADMIN_EMAILS: e2e-admin@example.test
      GOOGLE_INTEGRATION_MODE: simulation

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run rendered regression tests
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-browser-diagnostics
          path: |
            work/playwright-report
            work/playwright-results
          if-no-files-found: ignore
          retention-days: 7
